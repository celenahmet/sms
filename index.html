<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMS'26 | Sosyal Medya Söyleşileri</title>
    <link rel="icon" type="image/png" href="/assets/smslogo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                base: '#1A0730',
                primary: '#2A0E4A',
                gradient: '#4C1D95',
                neon: '#a855f7',      /* Neon Lila */
                soft: '#e9d5ff',      /* Pastel Lila */
                accent: '#facc15',    /* Neon Sarı */
                accentSoft: '#fef08a', /* Pastel Sarı */
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Space Grotesk', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #1A0730;
        color: white;
        font-family: 'Inter', sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .hero-gradient {
        background: linear-gradient(135deg, #1A0730 0%, #2A0E4A 35%, #4C1D95 70%, #a855f7 100%);
      }
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); }
        50% { transform: translateY(-20px) translateX(10px); }
        100% { transform: translateY(0px) translateX(0px); }
      }
      .animate-float {
        animation: float 10s ease-in-out infinite;
      }
      .uppercase-heading {
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
